<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS Contribution Penalty Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 750px; text-align: center; }
        
        .logo-container { margin-bottom: 20px; }
        .sss-logo { height: 60px; width: auto; }
        
        h2 { color: #0038a8; margin-top: 10px; border-bottom: 2px solid #eee; padding-bottom: 15px; font-size: 1.4rem; }
        
        /* Input Table Styles */
        .input-table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        .input-table th { background-color: #f8f9fa; color: #555; padding: 10px; border-bottom: 2px solid #dee2e6; font-size: 0.8rem; text-transform: uppercase; }
        .input-table td { padding: 8px; border-bottom: 1px solid #eee; }
        
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: none; border-color: #0038a8; box-shadow: 0 0 0 2px rgba(0,56,168,0.1); }

        .btn-add { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; margin-top: 15px; float: left; font-weight: bold; }
        .btn-add:hover { background-color: #218838; }
        
        .btn-calc { background-color: #0038a8; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 25px; width: 100%; transition: background 0.3s; }
        .btn-calc:hover { background-color: #002673; }
        
        .btn-remove { background-color: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Breakdown Table Styles */
        #breakdownSection { margin-top: 30px; display: none; text-align: left; }
        .breakdown-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9rem; }
        .breakdown-table th { background-color: #0038a8; color: white; padding: 10px; border: 1px solid #002673; }
        .breakdown-table td { padding: 10px; border: 1px solid #ddd; text-align: center; }

        #resultsSummary { padding: 20px; background: #f0f4f8; border-radius: 8px; text-align: right; border: 1px solid #d1d9e6; }
        .summary-line { margin-bottom: 8px; font-size: 15px; color: #444; }
        /* Removed text-transform: uppercase to allow mixed case */
        .total-due { font-weight: bold; font-size: 20px; color: #d9534f; border-top: 2px solid #d1d9e6; padding-top: 10px; margin-top: 10px; }

        .contact-info { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: left; }
        .contact-header { font-size: 1.05rem; font-weight: bold; color: #333; margin-bottom: 5px; }
        .contact-detail { font-size: 0.9rem; color: #666; margin-bottom: 3px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Social_Security_System_%28SSS%29.svg" alt="SSS Logo" class="sss-logo">
    </div>

    <h2>SSS Contribution Penalty Calculator</h2>
    
    <table class="input-table">
        <thead>
            <tr>
                <th style="width: 20%;">Month (1-12)</th>
                <th style="width: 20%;">Year</th>
                <th style="width: 50%;">Amount (PHP)</th>
                <th style="width: 10%;"></th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td><input type="number" class="month-input" min="1" max="12" placeholder="e.g. 3"></td>
                <td><input type="number" class="year-input" placeholder="2026"></td>
                <td><input type="number" class="amount-input" step="0.01" placeholder="0.00"></td>
                <td></td>
            </tr>
        </tbody>
    </table>

    <button class="btn-add" onclick="addRow()">+ Add Month</button>
    <div style="clear: both;"></div>

    <button class="btn-calc" onclick="calculateMultiPenalty()">Calculate Breakdown & Total</button>

    <div id="breakdownSection">
        <h3>Detailed Breakdown</h3>
        <table class="breakdown-table">
            <thead>
                <tr>
                    <th>Month</th>
                    <th>Year</th>
                    <th>Months Late</th>
                    <th>Amount</th>
                    <th>Penalty</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="breakdownBody"></tbody>
        </table>

        <div id="resultsSummary">
            <div class="summary-line">Total Principal: <span id="totalPrincipal">₱0.00</span></div>
            <div class="summary-line">Total Penalty (2%): <span id="totalPenalty">₱0.00</span></div>
            <div class="total-due">Total Due as of <span id="todayDate"></span>: <span id="grandTotal">₱0.00</span></div>
        </div>
    </div>

    <div class="contact-info">
        <div class="contact-header">Contact Information</div>
        <div class="contact-detail">
            Terry Cruz<br>
            SSS Legarda Branch
        </div>
    </div>
</div>

<script>
function addRow() {
    const tbody = document.getElementById('tableBody');
    const row = document.createElement('tr');
    row.innerHTML = `
        <td><input type="number" class="month-input" min="1" max="12" placeholder="e.g. 3"></td>
        <td><input type="number" class="year-input" placeholder="2026"></td>
        <td><input type="number" class="amount-input" step="0.01" placeholder="0.00"></td>
        <td><button class="btn-remove" onclick="this.parentElement.parentElement.remove()">✕</button></td>
    `;
    tbody.appendChild(row);
}

function calculateMultiPenalty() {
    const months = document.getElementsByClassName('month-input');
    const years = document.getElementsByClassName('year-input');
    const amounts = document.getElementsByClassName('amount-input');
    const breakdownBody = document.getElementById('breakdownBody');
    const today = new Date();
    
    // Set the "As of" date in the results
    const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('todayDate').innerText = today.toLocaleDateString(undefined, dateOptions);
    
    breakdownBody.innerHTML = ''; 
    
    let totalPrincipal = 0;
    let totalPenalty = 0;
    let validRows = 0;

    for (let i = 0; i < months.length; i++) {
        const m = parseInt(months[i].value);
        const y = parseInt(years[i].value);
        const principal = parseFloat(amounts[i].value);

        if (isNaN(m) || isNaN(y) || isNaN(principal)) continue;
        validRows++;

        const deadline = new Date(y, m, 10);
        let monthsOverdue = 0;
        let penaltyForThisRow = 0;

        if (today > deadline) {
            monthsOverdue = (today.getFullYear() - deadline.getFullYear()) * 12 + (today.getMonth() - deadline.getMonth());
            if (today.getDate() < 10) monthsOverdue--;
            if (monthsOverdue < 1) monthsOverdue = 1;
            
            penaltyForThisRow = principal * 0.02 * monthsOverdue;
        }

        const subtotal = principal + penaltyForThisRow;
        totalPrincipal += principal;
        totalPenalty += penaltyForThisRow;

        const row = document.createElement('tr');
        const monthName = new Date(y, m - 1).toLocaleString('default', { month: 'short' });
        row.innerHTML = `
            <td>${monthName}</td>
            <td>${y}</td>
            <td>${monthsOverdue}</td>
            <td>₱${principal.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
            <td>₱${penaltyForThisRow.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
            <td><strong>₱${subtotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</strong></td>
        `;
        breakdownBody.appendChild(row);
    }

    if (validRows === 0) {
        alert("Please fill in at least one row.");
        return;
    }

    const grandTotal = totalPrincipal + totalPenalty;

    document.getElementById('totalPrincipal').innerText = '₱' + totalPrincipal.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById('totalPenalty').innerText = '₱' + totalPenalty.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById('grandTotal').innerText = '₱' + grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
    
    document.getElementById('breakdownSection').style.display = 'block';
    document.getElementById('breakdownSection').scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
